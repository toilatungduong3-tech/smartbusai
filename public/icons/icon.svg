<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#020c1b"/>
  <!-- Glow circle -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#00ffe0" stroke-width="2" opacity="0.3"/>
  <!-- Bus body -->
  <rect x="96" y="180" width="320" height="180" rx="24" fill="#00ffe0" opacity="0.9"/>
  <!-- Bus windows row -->
  <rect x="120" y="200" width="55" height="60" rx="8" fill="#020c1b"/>
  <rect x="192" y="200" width="55" height="60" rx="8" fill="#020c1b"/>
  <rect x="264" y="200" width="55" height="60" rx="8" fill="#020c1b"/>
  <rect x="336" y="200" width="55" height="60" rx="8" fill="#020c1b"/>
  <!-- Bus windshield -->
  <rect x="120" y="200" width="270" height="0" rx="4" fill="none"/>
  <!-- Bus undercarriage -->
  <rect x="96" y="340" width="320" height="20" rx="4" fill="#00bfaa"/>
  <!-- Wheels -->
  <circle cx="160" cy="375" r="30" fill="#020c1b" stroke="#00ffe0" stroke-width="6"/>
  <circle cx="160" cy="375" r="12" fill="#00ffe0" opacity="0.7"/>
  <circle cx="352" cy="375" r="30" fill="#020c1b" stroke="#00ffe0" stroke-width="6"/>
  <circle cx="352" cy="375" r="12" fill="#00ffe0" opacity="0.7"/>
  <!-- AI spark -->
  <text x="256" y="172" text-anchor="middle" font-family="Arial,sans-serif" font-size="36" font-weight="bold" fill="#00ffe0">AI</text>
  <!-- Glow effect lines -->
  <line x1="96" y1="256" x2="60" y2="256" stroke="#00ffe0" stroke-width="2" opacity="0.4"/>
  <line x1="416" y1="256" x2="452" y2="256" stroke="#00ffe0" stroke-width="2" opacity="0.4"/>
</svg>
