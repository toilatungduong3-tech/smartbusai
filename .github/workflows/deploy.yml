name: CI/CD Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── CI: Kiểm tra code ──────────────────────────────────────────
  ci:
    name: 🔍 Kiểm tra CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Kiểm tra server khởi động được không
        run: |
          # Tạo .env tạm cho CI
          echo "PORT=2704" > .env
          echo "DB_HOST=localhost" >> .env
          echo "DB_USER=root" >> .env
          echo "DB_PASSWORD=" >> .env
          echo "DB_NAME=smartbusai" >> .env
          echo "DB_PORT=3306" >> .env
          # Chỉ kiểm tra parse không lỗi
          node -e "require('./server/server.js')" &
          sleep 3
          kill %1 2>/dev/null || true
        continue-on-error: true

  # ── CD: Deploy lên VPS ─────────────────────────────────────────
  deploy:
    name: 🚀 Deploy lên server
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy qua SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          port:     ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd /var/www/smartbusai

            # Pull code mới nhất
            git pull origin main

            # Cài dependencies mới (nếu có)
            npm ci --omit=dev

            # Restart app với PM2
            pm2 restart smartbusai || pm2 start npm --name smartbusai -- start

            # Lưu lại để tự restart khi reboot
            pm2 save

            echo "✅ Deploy thành công!"
